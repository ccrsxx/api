name: Deployment

run-name: ${{ github.event_name == 'workflow_dispatch' && format('Manual deploy / {0}', inputs.sha || github.sha) || format('Automatic deploy / {0}', github.event.head_commit.message) }}

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      sha:
        description: 'Commit SHA to deploy'
        required: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yaml

  extract-tools-version:
    uses: ./.github/workflows/extract-tools-version.yaml

  migrate:
    name: Migrate database
    runs-on: self-hosted
    environment: production

    needs:
      - ci
      - extract-tools-version

    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ needs.extract-tools-version.outputs.go-version }}

      - name: Install goose
        run: go install github.com/pressly/goose/v3/cmd/goose@${{ needs.extract-tools-version.outputs.goose-version }}

      - name: Start PostgreSQL before migration
        env:
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
        run: docker compose up -d --wait db

      - name: Run migration
        env:
          GOOSE_DRIVER: postgres
          GOOSE_DBSTRING: postgres://postgres:${{ secrets.DATABASE_PASSWORD }}@host.docker.internal:5444/postgres
          GOOSE_MIGRATION_DIR: internal/db/migrations
        run: make db-migrate

  deploy:
    name: Build and deploy via Docker on VPS
    runs-on: self-hosted

    needs:
      - migrate
      - extract-tools-version

    permissions:
      packages: write

    env:
      SHA: ${{ inputs.sha || github.sha }}
      CACHE_IMAGE: 'ghcr.io/${{ github.repository }}:cache'
      LATEST_IMAGE: 'ghcr.io/${{ github.repository }}:latest'

      CURRENT_IMAGE: ''

    steps:
      - name: Set current image tag
        run: |
          echo "CURRENT_IMAGE=ghcr.io/${{ github.repository }}:${{ env.SHA }}" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ env.SHA }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Check if image already exists
        id: image-check
        run: |
          if docker buildx imagetools inspect "${{ env.CURRENT_IMAGE }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "${{ env.CURRENT_IMAGE }} already exists, skipping build"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "${{ env.CURRENT_IMAGE }} not found, will build"
          fi

      - name: Determine image tags
        id: tags
        if: steps.image-check.outputs.exists != 'true'
        run: |
          tags="${{ env.CURRENT_IMAGE }}"

          if [ "${{ github.event_name }}" = "push" ]; then
            tags="$tags,${{ env.LATEST_IMAGE }}"
          fi

          echo "Determined tags: $tags"

          echo "tags=$tags" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        if: steps.image-check.outputs.exists != 'true'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          platforms: linux/arm64
          build-args: |
            GO_VERSION=${{ needs.extract-tools-version.outputs.go-version }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=registry,ref=${{ env.CACHE_IMAGE }}
          cache-to: type=registry,ref=${{ env.CACHE_IMAGE }},mode=max

      - name: Setup env
        run: |
          cat >> .env << 'EOF'

          OG_URL=${{ secrets.OG_URL }}
          ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}

          SECRET_KEY=${{ secrets.SECRET_KEY }}
          PRIVATE_SECRET_KEY=${{ secrets.PRIVATE_SECRET_KEY }}

          EMAIL_TARGET=${{ secrets.EMAIL_TARGET }}
          EMAIL_ADDRESS=${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD=${{ secrets.EMAIL_PASSWORD }}

          JWT_SECRET=${{ secrets.JWT_SECRET }}

          BACKEND_PUBLIC_URL=${{ secrets.BACKEND_PUBLIC_URL }}

          FRONTEND_BASE_URL=${{ secrets.FRONTEND_BASE_URL }}
          FRONTEND_PUBLIC_URL=${{ secrets.FRONTEND_PUBLIC_URL }}

          OAUTH_GITHUB_CLIENT_ID=${{ secrets.OAUTH_GITHUB_CLIENT_ID }}
          OAUTH_GITHUB_CLIENT_SECRET=${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}

          IPINFO_TOKEN=${{ secrets.IPINFO_TOKEN }}

          CLOUDFLARE_TURNSTILE_SECRET_KEY=${{ secrets.CLOUDFLARE_TURNSTILE_SECRET_KEY }}

          PUSHOVER_USER_KEY=${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_APP_TOKEN=${{ secrets.PUSHOVER_APP_TOKEN }}

          PIXIV_TOKEN=${{ secrets.PIXIV_TOKEN }}
          PIXIV_IMAGE_URL=${{ secrets.PIXIV_IMAGE_URL }}

          DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}

          JELLYFIN_URL=${{ secrets.JELLYFIN_URL }}
          JELLYFIN_API_KEY=${{ secrets.JELLYFIN_API_KEY }}
          JELLYFIN_USERNAME=${{ secrets.JELLYFIN_USERNAME }}
          JELLYFIN_IMAGE_URL=${{ secrets.JELLYFIN_IMAGE_URL }}

          NAVIDROME_URL=${{ secrets.NAVIDROME_URL }}
          NAVIDROME_USERNAME=${{ secrets.NAVIDROME_USERNAME }}
          NAVIDROME_PASSWORD=${{ secrets.NAVIDROME_PASSWORD }}

          SPOTIFY_CLIENT_ID=${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET=${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN=${{ secrets.SPOTIFY_REFRESH_TOKEN }}

          EOF

      - name: Deploy with Docker Compose
        env:
          IMAGE_TAG: ${{ env.SHA }}
        run: |
          docker compose pull
          docker compose up -d
