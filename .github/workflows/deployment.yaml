name: Deployment

run-name: ${{ github.event_name == 'workflow_dispatch' && format('Manual deploy / {0}', inputs.sha || github.sha) || format('Automatic deploy / {0}', github.event.head_commit.message) }}

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      sha:
        description: 'Commit SHA to deploy'
        required: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yaml

  extract-tools-version:
    uses: ./.github/workflows/extract-tools-version.yaml

  migrate:
    name: Migrate database
    runs-on: self-hosted
    environment: production

    needs:
      - ci
      - extract-tools-version

    steps:
      - name: Checkout repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ needs.extract-tools-version.outputs.go-version }}

      - name: Install goose
        run: go install github.com/pressly/goose/v3/cmd/goose@${{ needs.extract-tools-version.outputs.goose-version }}

      - name: Start PostgreSQL before migration
        env:
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
        run: docker compose up -d --wait db

      - name: Run migration
        env:
          GOOSE_DRIVER: postgres
          GOOSE_DBSTRING: postgres://postgres:${{ secrets.DATABASE_PASSWORD }}@host.docker.internal:5444/postgres
          GOOSE_MIGRATION_DIR: internal/db/migrations
        run: make db-migrate

  deploy:
    name: Build and deploy via Docker on VPS
    runs-on: self-hosted

    needs:
      - migrate
      - extract-tools-version

    permissions:
      packages: write

    env:
      SHA: ${{ inputs.sha || github.sha }}
      CACHE_IMAGE: 'ghcr.io/${{ github.repository }}:cache'
      LATEST_IMAGE: 'ghcr.io/${{ github.repository }}:latest'

      CURRENT_IMAGE: ''

    steps:
      - name: Set current image tag
        run: |
          echo "CURRENT_IMAGE=ghcr.io/${{ github.repository }}:${{ env.SHA }}" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ env.SHA }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build and push Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          platforms: linux/arm64
          build-args: |
            GO_VERSION=${{ needs.extract-tools-version.outputs.go-version }}
          push: true
          tags: |
            ${{ env.LATEST_IMAGE }}
            ${{ env.CURRENT_IMAGE }}
          cache-from: type=registry,ref=${{ env.CACHE_IMAGE }}
          cache-to: type=registry,ref=${{ env.CACHE_IMAGE }},mode=max

      - name: Setup env
        run: |
          echo "OG_URL=${{ secrets.OG_URL }}" >> .env
          echo "ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}" >> .env

          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env
          echo "PRIVATE_SECRET_KEY=${{ secrets.PRIVATE_SECRET_KEY }}" >> .env

          echo "EMAIL_TARGET=${{ secrets.EMAIL_TARGET }}" >> .env
          echo "EMAIL_ADDRESS=${{ secrets.EMAIL_ADDRESS }}" >> .env
          echo "EMAIL_PASSWORD=${{ secrets.EMAIL_PASSWORD }}" >> .env

          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env

          echo "BACKEND_PUBLIC_URL=${{ secrets.BACKEND_PUBLIC_URL }}" >> .env

          echo "FRONTEND_BASE_URL=${{ secrets.FRONTEND_BASE_URL }}" >> .env
          echo "FRONTEND_PUBLIC_URL=${{ secrets.FRONTEND_PUBLIC_URL }}" >> .env

          echo "OAUTH_GITHUB_CLIENT_ID=${{ secrets.OAUTH_GITHUB_CLIENT_ID }}" >> .env
          echo "OAUTH_GITHUB_CLIENT_SECRET=${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}" >> .env

          echo "IPINFO_TOKEN=${{ secrets.IPINFO_TOKEN }}" >> .env

          echo "CLOUDFLARE_TURNSTILE_SECRET_KEY=${{ secrets.CLOUDFLARE_TURNSTILE_SECRET_KEY }}" >> .env

          echo "PUSHOVER_USER_KEY=${{ secrets.PUSHOVER_USER_KEY }}" >> .env
          echo "PUSHOVER_APP_TOKEN=${{ secrets.PUSHOVER_APP_TOKEN }}" >> .env

          echo "PIXIV_TOKEN=${{ secrets.PIXIV_TOKEN }}" >> .env
          echo "PIXIV_IMAGE_URL=${{ secrets.PIXIV_IMAGE_URL }}" >> .env

          echo "DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}" >> .env

          echo "JELLYFIN_URL=${{ secrets.JELLYFIN_URL }}" >> .env
          echo "JELLYFIN_API_KEY=${{ secrets.JELLYFIN_API_KEY }}" >> .env
          echo "JELLYFIN_USERNAME=${{ secrets.JELLYFIN_USERNAME }}" >> .env
          echo "JELLYFIN_IMAGE_URL=${{ secrets.JELLYFIN_IMAGE_URL }}" >> .env

          echo "NAVIDROME_URL=${{ secrets.NAVIDROME_URL }}" >> .env
          echo "NAVIDROME_USERNAME=${{ secrets.NAVIDROME_USERNAME }}" >> .env
          echo "NAVIDROME_PASSWORD=${{ secrets.NAVIDROME_PASSWORD }}" >> .env

          echo "SPOTIFY_CLIENT_ID=${{ secrets.SPOTIFY_CLIENT_ID }}" >> .env
          echo "SPOTIFY_CLIENT_SECRET=${{ secrets.SPOTIFY_CLIENT_SECRET }}" >> .env
          echo "SPOTIFY_REFRESH_TOKEN=${{ secrets.SPOTIFY_REFRESH_TOKEN }}" >> .env

      - name: Deploy with Docker Compose
        run: |
          docker compose pull
          docker compose up -d
